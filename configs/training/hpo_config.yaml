# NeuroFusion-AD Hyperparameter Optimization Configuration
# Document ID: SAD-001 § 6.2 — HPO Strategy
# Uses Optuna with MedianPruner and SQLite persistent storage.
# Run: python scripts/hpo_optuna.py

study_name: neurofusion_hpo
storage: sqlite:///optuna_study.db
n_trials: 30
direction: maximize           # maximize val_auc
metric: val_auc

pruner: MedianPruner
pruner_n_startup_trials: 5    # No pruning during first 5 trials
pruner_n_warmup_steps: 10     # No pruning during first 10 reported steps

n_epochs_per_trial: 40
early_stopping_patience: 15

# Search space definitions
# log_uniform: sample uniformly in log space
# uniform: sample uniformly in linear space
# categorical: choose from list
search_space:
  learning_rate:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-3

  weight_decay:
    type: log_uniform
    low: 1.0e-5
    high: 1.0e-3

  dropout:
    type: uniform
    low: 0.05
    high: 0.30

  gradient_accumulation_steps:
    type: categorical
    choices: [2, 4, 8]

  batch_size:
    type: categorical
    choices: [16, 32]

  cls_weight:
    type: uniform
    low: 0.5
    high: 2.0

  reg_weight:
    type: uniform
    low: 0.1
    high: 1.0

  surv_weight:
    type: uniform
    low: 0.1
    high: 1.0

  graph_threshold:
    type: uniform
    low: 0.5
    high: 0.9

  onecycle_pct_start:
    type: uniform
    low: 0.1
    high: 0.4

# Fixed settings for HPO trials (not searched)
fixed:
  embed_dim: 768
  num_heads: 8
  gnn_layers: 3
  data:
    adni_train: data/processed/adni/adni_train.csv
    adni_val: data/processed/adni/adni_val.csv
    scaler_path: data/processed/adni/scaler.pkl

wandb:
  project: neurofusion-ad
  tags:
    - hpo
    - optuna
    - phase2b
