# NeuroFusion-AD Phase 2B Remediated Training Configuration
# Phase 2B leakage fix: ABETA42_CSF removed from fluid encoder inputs.
# Architecture reduced to prevent overfitting (N=345 ADNI train samples).
#
# ROOT CAUSE ANALYSIS (Phase 2):
#   - ABETA42_CSF in fluid features caused direct leakage (r=-0.86 with AMYLOID_POSITIVE)
#   - 12.7M params for N=345 → overfitting
#   - This config: embed_dim=256, dropout=0.4, wd=1e-3, ~2.2M params
#
# Document traceability:
#   SAD-001 § 6.1 — Training Infrastructure
#   RMF-001 § 4.3 — Phase 2B Risk Controls

model:
  embed_dim: 256           # reduced from 768 — prevents overfitting on N=345
  num_heads: 4             # reduced from 8
  gnn_layers: 2            # reduced from 3
  dropout: 0.4             # increased from 0.1 — stronger regularization
  graph_threshold: 0.7
  fluid_input_dim: 2       # Phase 2B: [PTAU217, NFL_PLASMA] only

training:
  n_epochs: 150
  batch_size: 32
  gradient_accumulation_steps: 4       # Effective batch = 32 * 4 = 128 (ADNI N=345)
  learning_rate: 3.0e-4
  weight_decay: 1.0e-3                 # increased from 1e-4 — L2 regularization
  gradient_clip: 0.5                   # reduced from 1.0 — prevent gradient explosion
  early_stopping_patience: 25
  onecycle_pct_start: 0.3              # 30% warm-up (better for small datasets)
  augmentation_noise_std: 0.01         # Gaussian noise σ=0.01 on continuous features

loss_weights:
  cls: 1.0    # BCEWithLogitsLoss — amyloid positivity (36.2% NaN → masked)
  reg: 0.5    # MSELoss — MMSE slope (7.8% NaN → masked)
  surv: 0.5   # Cox partial likelihood — time-to-event

data:
  adni_train: data/processed/adni/adni_train.csv
  adni_val: data/processed/adni/adni_val.csv
  adni_test: data/processed/adni/adni_test.csv
  biohermes_train: data/processed/biohermes/biohermes001_train.csv
  biohermes_val: data/processed/biohermes/biohermes001_val.csv
  scaler_path: data/processed/adni/scaler.pkl
  biohermes_scaler_path: data/processed/biohermes/biohermes_digital_scaler.pkl

# Gate: if ADNI val AUC < 0.68 after full training, STOP and report. Do not proceed.
performance_gates:
  adni_baseline_min_auc: 0.60    # gate for train_baseline.py
  adni_hpo_min_auc: 0.68         # gate for train_best_model.py
  biohermes_finetune_min_auc: 0.75

wandb:
  project: neurofusion-ad
  entity: ""    # set via WANDB_ENTITY env var or leave empty
  tags:
    - phase2b
    - remediated
    - adni
    - leakage-fixed

checkpoints:
  dir: models/checkpoints/adni_phase2b
  save_every_n_epochs: 10
