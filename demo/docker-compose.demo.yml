version: "3.9"

# NeuroFusion-AD Clinical Demo Stack
#
# Runs the demo backend (port 3000) which serves:
#   - React frontend SPA at /
#   - Demo API at /api/...
#   - Proxies inference to the main FHIR API at localhost:8000
#
# Prerequisites:
#   - Main API must be running: docker-compose up -d
#   - Or FHIR_API_URL env var set to the API endpoint
#
# Usage:
#   docker-compose -f docker-compose.demo.yml up --build -d
#   → Demo at http://localhost:3000

services:
  demo:
    build:
      context: ..
      dockerfile: demo/Dockerfile.demo
    container_name: neurofusion_demo
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DEMO_PORT: "3000"
      FHIR_API_URL: "${FHIR_API_URL:-http://host.docker.internal:8000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/scenarios"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
