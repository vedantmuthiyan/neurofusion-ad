<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroFusion-AD — Clinical Decision Support Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    :root {
      --nf-blue: #1a3c6e;
      --nf-teal: #0d6efd;
      --risk-low: #198754;
      --risk-moderate: #fd7e14;
      --risk-high: #dc3545;
    }
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .header {
      background: var(--nf-blue);
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 1.3rem; margin: 0; font-weight: 600; }
    .disclaimer-banner {
      background: #fff3cd;
      border-bottom: 2px solid #ffc107;
      padding: 6px 24px;
      font-size: 0.8rem;
      color: #664d03;
    }
    .scenario-btn {
      width: 100%;
      text-align: left;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 2px solid transparent;
    }
    .scenario-btn.active { border-color: var(--nf-blue); background: #e8f0fe; }
    .card { border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .card-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; }

    /* Risk gauge */
    .gauge-container { position: relative; width: 220px; margin: 0 auto; }
    .gauge-arc { fill: none; stroke-linecap: round; }
    .gauge-label { font-size: 2.2rem; font-weight: 700; }
    .gauge-sublabel { font-size: 0.85rem; fill: #6c757d; }

    /* Risk badge */
    .risk-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .risk-badge.low { background: #d1fae5; color: #065f46; }
    .risk-badge.moderate { background: #ffedd5; color: #9a3412; }
    .risk-badge.high { background: #fee2e2; color: #991b1b; }

    /* Modality bars */
    .modality-bar {
      height: 20px;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .modality-fluid    { background: #3b82f6; }
    .modality-acoustic { background: #8b5cf6; }
    .modality-motor    { background: #10b981; }
    .modality-clinical { background: #f59e0b; }

    /* KM curve */
    .km-chart { width: 100%; height: 220px; }

    /* Alert banner */
    .alert-banner {
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 0.9rem;
      border-left: 5px solid;
    }
    .alert-banner.high     { background: #fee2e2; border-color: #dc3545; color: #7f1d1d; }
    .alert-banner.moderate { background: #fff7ed; border-color: #fd7e14; color: #7c2d12; }
    .alert-banner.low      { background: #f0fdf4; border-color: #198754; color: #14532d; }

    .loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: #6c757d;
    }
    .spinner-border { width: 2rem; height: 2rem; }

    /* CI bar */
    .ci-track { background: #e9ecef; height: 8px; border-radius: 4px; position: relative; margin: 8px 0; }
    .ci-fill  { height: 100%; border-radius: 4px; position: absolute; transition: all 0.4s; }
    .ci-dot   { width: 12px; height: 12px; border-radius: 50%; position: absolute; top: -2px; transform: translateX(-50%); transition: left 0.4s; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_BASE = window.location.origin + "/api";

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function getRiskLevel(prob) {
  if (prob < 0.35) return "low";
  if (prob < 0.65) return "moderate";
  return "high";
}

function getRiskColor(level) {
  return { low: "#198754", moderate: "#fd7e14", high: "#dc3545" }[level];
}

// ---------------------------------------------------------------------------
// RiskGauge
// ---------------------------------------------------------------------------

function RiskGauge({ probability, ciLower, ciHigh }) {
  const level = getRiskLevel(probability);
  const color = getRiskColor(level);
  const pct = Math.round(probability * 100);

  // SVG half-circle gauge
  const r = 80, cx = 110, cy = 110;
  const circumference = Math.PI * r;
  const strokePct = probability * circumference;

  // CI arc
  const ciLowStroke = ciLower * circumference;
  const ciHighStroke = ciHigh * circumference;
  const ciWidth = (ciHigh - ciLower) * circumference;

  function polarToCartesian(pct) {
    const angle = Math.PI + pct * Math.PI; // 180° to 360°
    return {
      x: cx + r * Math.cos(angle),
      y: cy + r * Math.sin(angle),
    };
  }

  return (
    <div className="gauge-container">
      <svg viewBox="0 0 220 130" style={{overflow: "visible"}}>
        {/* Track */}
        <path
          d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`}
          fill="none" stroke="#e9ecef" strokeWidth="16" strokeLinecap="round"
        />
        {/* CI range band */}
        <path
          d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`}
          fill="none"
          stroke={color}
          strokeWidth="16"
          strokeOpacity="0.2"
          strokeLinecap="round"
          strokeDasharray={`${ciWidth} ${circumference}`}
          strokeDashoffset={-ciLowStroke}
          transform={`rotate(0 ${cx} ${cy})`}
        />
        {/* Value arc */}
        <path
          d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`}
          fill="none"
          stroke={color}
          strokeWidth="16"
          strokeLinecap="round"
          strokeDasharray={`${strokePct} ${circumference}`}
        />
        {/* Probability text */}
        <text x={cx} y={cy - 8} textAnchor="middle" className="gauge-label" fill={color}>
          {pct}%
        </text>
        <text x={cx} y={cy + 10} textAnchor="middle" className="gauge-sublabel">
          Amyloid probability
        </text>
        {/* Axis labels */}
        <text x={cx - r - 4} y={cy + 18} textAnchor="end" fontSize="11" fill="#adb5bd">0%</text>
        <text x={cx + r + 4} y={cy + 18} textAnchor="start" fontSize="11" fill="#adb5bd">100%</text>
      </svg>
      {/* CI display */}
      <div className="text-center" style={{marginTop: -8}}>
        <small className="text-muted">
          95% CI: {Math.round(ciLower*100)}% – {Math.round(ciHigh*100)}%
        </small>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// ModalityImportanceChart
// ---------------------------------------------------------------------------

function ModalityImportanceChart({ importance }) {
  const modalityMeta = [
    { key: "fluid",    label: "Fluid Biomarkers", colorClass: "modality-fluid" },
    { key: "acoustic", label: "Acoustic",          colorClass: "modality-acoustic" },
    { key: "motor",    label: "Motor",             colorClass: "modality-motor" },
    { key: "clinical", label: "Clinical",          colorClass: "modality-clinical" },
  ];

  const max = Math.max(...Object.values(importance));

  return (
    <div>
      {modalityMeta.map(({ key, label, colorClass }) => {
        const val = importance[key] || 0;
        const pct = max > 0 ? (val / max) * 100 : 0;
        return (
          <div key={key} className="mb-2">
            <div className="d-flex justify-content-between mb-1">
              <small>{label}</small>
              <small className="text-muted">{(val * 100).toFixed(1)}%</small>
            </div>
            <div style={{background: "#e9ecef", height: 16, borderRadius: 4}}>
              <div
                className={`modality-bar ${colorClass}`}
                style={{width: `${pct}%`, height: 16}}
              />
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------------------------------------------------------------------------
// KaplanMeierCurve (SVG-based)
// ---------------------------------------------------------------------------

function KaplanMeierCurve({ survivalData }) {
  if (!survivalData) return null;

  const { months, patient_survival, adni_reference } = survivalData;

  const W = 340, H = 180, PAD = { top: 10, right: 10, bottom: 36, left: 42 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  const maxMonth = 60;

  function toX(m) { return PAD.left + (m / maxMonth) * chartW; }
  function toY(s) { return PAD.top + (1 - s) * chartH; }

  function buildPath(data) {
    return months.map((m, i) => `${i === 0 ? "M" : "L"} ${toX(m)} ${toY(data[i])}`).join(" ");
  }

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="km-chart">
      {/* Grid lines */}
      {[0, 0.25, 0.5, 0.75, 1.0].map(y => (
        <line key={y}
          x1={PAD.left} y1={toY(y)} x2={W - PAD.right} y2={toY(y)}
          stroke="#e9ecef" strokeWidth="1"
        />
      ))}
      {/* Y axis labels */}
      {[0, 25, 50, 75, 100].map(pct => (
        <text key={pct} x={PAD.left - 6} y={toY(pct / 100) + 4} textAnchor="end" fontSize="10" fill="#6c757d">
          {pct}%
        </text>
      ))}
      {/* X axis labels */}
      {[0, 12, 24, 36, 48, 60].map(m => (
        <text key={m} x={toX(m)} y={H - 6} textAnchor="middle" fontSize="10" fill="#6c757d">
          {m}mo
        </text>
      ))}
      {/* ADNI reference */}
      <path d={buildPath(adni_reference)} fill="none" stroke="#adb5bd" strokeWidth="1.5" strokeDasharray="4 3" />
      {/* Patient curve */}
      <path d={buildPath(patient_survival)} fill="none" stroke="#dc3545" strokeWidth="2.5" />

      {/* Axis labels */}
      <text x={PAD.left + chartW / 2} y={H - 1} textAnchor="middle" fontSize="10" fill="#6c757d">
        Time (months)
      </text>
      <text
        x={10} y={PAD.top + chartH / 2}
        textAnchor="middle" fontSize="10" fill="#6c757d"
        transform={`rotate(-90 10 ${PAD.top + chartH / 2})`}
      >
        PFS
      </text>

      {/* Legend */}
      <line x1={PAD.left + 4} y1={16} x2={PAD.left + 24} y2={16} stroke="#dc3545" strokeWidth="2.5" />
      <text x={PAD.left + 28} y={20} fontSize="10" fill="#495057">This patient</text>
      <line x1={PAD.left + 90} y1={16} x2={PAD.left + 110} y2={16} stroke="#adb5bd" strokeWidth="1.5" strokeDasharray="4 3" />
      <text x={PAD.left + 114} y={20} fontSize="10" fill="#495057">ADNI median</text>
    </svg>
  );
}

// ---------------------------------------------------------------------------
// AlertBanner
// ---------------------------------------------------------------------------

function AlertBanner({ noteText, riskLevel }) {
  const icons = { high: "⚠️", moderate: "ℹ️", low: "✓" };
  // Extract recommendation sentence
  const recMatch = noteText && noteText.match(/RECOMMENDATION:[^.]+\./);
  const rec = recMatch ? recMatch[0] : noteText;

  return (
    <div className={`alert-banner ${riskLevel}`}>
      <strong>{icons[riskLevel]} {riskLevel.toUpperCase()} RISK</strong>
      <div className="mt-1">{rec}</div>
      <div className="mt-1 text-muted" style={{fontSize: "0.78rem"}}>
        Investigational SaMD (FDA De Novo pathway) — Not cleared for clinical use.
        All decisions require licensed clinician review.
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// PatientCard
// ---------------------------------------------------------------------------

function PatientCard({ scenario }) {
  const biomarkers = [
    { label: "MMSE", value: scenario.mmse_baseline, normal: "> 24", unit: "/30" },
    { label: "pTau217", value: scenario.ptau217?.toFixed(2), normal: "< 0.40", unit: "pg/mL" },
    { label: "NfL", value: scenario.nfl_plasma?.toFixed(1), normal: "< 14", unit: "pg/mL" },
  ];
  const apoeLabels = { 0: "ε3/ε3", 1: "ε3/ε4", 2: "ε4/ε4" };

  return (
    <div>
      <div className="d-flex align-items-center mb-2 gap-2">
        <div style={{
          width: 44, height: 44, borderRadius: "50%",
          background: "#e8f0fe", display: "flex", alignItems: "center",
          justifyContent: "center", fontSize: "1.4rem"
        }}>
          {scenario.sex === "F" ? "👩" : "👨"}
        </div>
        <div>
          <div className="fw-semibold">{scenario.name}</div>
          <small className="text-muted">
            {scenario.age} yrs · {scenario.sex === "F" ? "Female" : "Male"} · APOE {apoeLabels[scenario.apoe4_count] || scenario.apoe4_count}
          </small>
        </div>
      </div>
      <p style={{fontSize: "0.83rem", color: "#495057"}}>{scenario.narrative}</p>
      <div className="row g-2 mt-1">
        {biomarkers.map(b => (
          <div key={b.label} className="col-4">
            <div className="card p-2 text-center" style={{fontSize: "0.8rem"}}>
              <div className="text-muted">{b.label}</div>
              <div className="fw-bold" style={{fontSize: "1.1rem"}}>{b.value}</div>
              <div style={{color: "#adb5bd", fontSize: "0.7rem"}}>{b.unit}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------

function App() {
  const [scenarios, setScenarios] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    fetch(`${API_BASE}/scenarios`)
      .then(r => r.json())
      .then(data => {
        setScenarios(data);
        // Auto-select first
        if (data.length > 0) selectScenario(data[0].id);
      })
      .catch(e => setError("Could not load scenarios: " + e.message));
  }, []);

  function selectScenario(id) {
    setSelectedId(id);
    setResult(null);
    setLoading(true);
    setError(null);

    fetch(`${API_BASE}/predict/${id}`, { method: "POST" })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => { setResult(data); setLoading(false); })
      .catch(e => { setError("Inference failed: " + e.message); setLoading(false); });
  }

  // Extract display data from result
  let probability = null, ciLower = null, ciHigh = null;
  let importance = null, noteText = null, riskLevel = null;
  let mmseSlope = null;

  if (result?.fhir) {
    const fhir = result.fhir;
    const pred = fhir.prediction?.[0];
    probability = pred?.probabilityDecimal;
    ciLower = pred?.whenRange?.low?.value ?? 0;
    ciHigh  = pred?.whenRange?.high?.value ?? 1;
    riskLevel = pred?.qualitativeRisk?.coding?.[0]?.code || getRiskLevel(probability || 0);
    noteText = fhir.note?.[0]?.text || "";

    // Modality importance
    const modExt = fhir.extension?.find(e => e.url?.includes("modality-importance"));
    if (modExt?.extension) {
      importance = {};
      modExt.extension.forEach(sub => { importance[sub.url] = sub.valueDecimal; });
    }

    // MMSE slope from second prediction
    const mmsePred = fhir.prediction?.find(p => p.outcome?.coding?.[0]?.code === "72107-6");
    if (mmsePred?.rationale) {
      const m = mmsePred.rationale.match(/([+-][\d.]+) pts\/year/);
      if (m) mmseSlope = parseFloat(m[1]);
    }
  }

  const selectedScenario = scenarios.find(s => s.id === selectedId);

  return (
    <div style={{minHeight: "100vh"}}>
      {/* Header */}
      <div className="header">
        <h1>🧠 NeuroFusion-AD — Clinical Decision Support</h1>
        <div style={{fontSize: "0.78rem", opacity: 0.8}}>
          Phase 2B · embed_dim=256 · ADNI AUC=0.890 · BH-001 AUC=0.907
        </div>
      </div>

      {/* Disclaimer */}
      <div className="disclaimer-banner">
        ⚠️ <strong>INVESTIGATIONAL DEVICE</strong> — FDA De Novo pathway (pending).
        This output is for research/demonstration purposes only. Not cleared for clinical decision-making.
        All predictions require licensed clinician review and confirmation.
      </div>

      <div className="container-fluid py-3">
        <div className="row g-3">

          {/* Scenario selector */}
          <div className="col-md-3">
            <div className="card p-3">
              <div className="card-title mb-2">Patient Scenarios</div>
              {scenarios.map(s => (
                <button
                  key={s.id}
                  className={`btn btn-outline-secondary scenario-btn ${selectedId === s.id ? "active" : ""}`}
                  onClick={() => selectScenario(s.id)}
                >
                  <div className="fw-semibold">{s.name}</div>
                  <small className="text-muted">{s.age} yrs · MMSE {s.mmse}</small>
                </button>
              ))}

              {/* Model metadata */}
              <hr />
              <div className="card-title mb-1">Model Info</div>
              <div style={{fontSize: "0.78rem", color: "#6c757d", lineHeight: 1.6}}>
                <div>T = 0.756 (temperature scaling)</div>
                <div>MC samples = 30</div>
                <div>Threshold = 0.644 (Youden's J)</div>
                <div>Device: CUDA (RTX 3090)</div>
              </div>
            </div>
          </div>

          {/* Main content */}
          <div className="col-md-9">
            {loading && (
              <div className="loading-overlay">
                <div className="text-center">
                  <div className="spinner-border text-primary mb-3" />
                  <div>Running inference (30 MC passes)…</div>
                </div>
              </div>
            )}

            {error && (
              <div className="alert alert-danger">{error}</div>
            )}

            {!loading && result && selectedScenario && (
              <>
                {/* Alert banner */}
                <div className="mb-3">
                  <AlertBanner noteText={noteText} riskLevel={riskLevel} />
                </div>

                <div className="row g-3">
                  {/* Patient details */}
                  <div className="col-md-5">
                    <div className="card p-3 h-100">
                      <div className="card-title mb-2">Patient Details</div>
                      <PatientCard scenario={result.scenario} />
                    </div>
                  </div>

                  {/* Risk gauge */}
                  <div className="col-md-7">
                    <div className="card p-3 h-100">
                      <div className="card-title mb-2">Amyloid Positivity Risk</div>
                      <div className="d-flex align-items-center gap-4 flex-wrap">
                        <RiskGauge
                          probability={probability}
                          ciLower={ciLower}
                          ciHigh={ciHigh}
                        />
                        <div>
                          <div className="mb-2">
                            <span className={`risk-badge ${riskLevel}`}>
                              {riskLevel?.toUpperCase()} RISK
                            </span>
                          </div>
                          <div style={{fontSize: "0.85rem", color: "#495057"}}>
                            <div><strong>Probability:</strong> {Math.round(probability*100)}%</div>
                            <div><strong>95% CI:</strong> {Math.round(ciLower*100)}–{Math.round(ciHigh*100)}%</div>
                            <div><strong>Threshold:</strong> 64.4% (Youden's J)</div>
                            {mmseSlope !== null && (
                              <div className="mt-1">
                                <strong>MMSE slope:</strong>{" "}
                                <span style={{color: mmseSlope < -1.5 ? "#dc3545" : "#198754"}}>
                                  {mmseSlope > 0 ? "+" : ""}{mmseSlope.toFixed(1)} pts/yr
                                </span>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Modality importance */}
                  <div className="col-md-6">
                    <div className="card p-3 h-100">
                      <div className="card-title mb-2">Modality Importance</div>
                      {importance ? (
                        <ModalityImportanceChart importance={importance} />
                      ) : (
                        <div className="text-muted small">No modality data</div>
                      )}
                    </div>
                  </div>

                  {/* KM curve */}
                  <div className="col-md-6">
                    <div className="card p-3 h-100">
                      <div className="card-title mb-2">Progression-Free Survival (Predicted)</div>
                      <KaplanMeierCurve survivalData={result.survival_curve} />
                      <div className="text-muted" style={{fontSize: "0.72rem", marginTop: 4}}>
                        Based on Cox proportional hazards model output. Illustrative only.
                      </div>
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
